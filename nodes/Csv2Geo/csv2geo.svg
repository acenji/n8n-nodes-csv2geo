<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Globe circle -->
  <circle cx="14" cy="16" r="12" fill="#87CEEB"/>
  <!-- Globe meridian lines -->
  <ellipse cx="14" cy="16" rx="5" ry="12" fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.7"/>
  <ellipse cx="14" cy="16" rx="9" ry="12" fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.6"/>
  <!-- Globe equator and latitude lines -->
  <line x1="2" y1="16" x2="26" y2="16" stroke="#1a1a2e" stroke-width="1" opacity="0.7"/>
  <ellipse cx="14" cy="10" rx="11" ry="1" fill="none" stroke="#1a1a2e" stroke-width="0.9" opacity="0.5"/>
  <ellipse cx="14" cy="22" rx="11" ry="1" fill="none" stroke="#1a1a2e" stroke-width="0.9" opacity="0.5"/>
  <!-- Globe outline -->
  <circle cx="14" cy="16" r="12" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- Map pin shadow -->
  <ellipse cx="23" cy="28" rx="3" ry="1" fill="#000" opacity="0.15"/>
  <!-- Map pin -->
  <path d="M23 6 C19.7 6 17 8.7 17 12 C17 16.5 23 23 23 23 C23 23 29 16.5 29 12 C29 8.7 26.3 6 23 6 Z" fill="#d97c2b" stroke="#b5631e" stroke-width="0.8"/>
  <!-- Pin dot -->
  <circle cx="23" cy="12" r="2.5" fill="#fce4c4"/>
</svg>
